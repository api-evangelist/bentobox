aid: bentobox
name: BentoBox
description: >-
  BentoBox is a restaurant marketing and commerce platform, part of Fiserv, that
  powers restaurant websites, online ordering, takeout and delivery, events,
  reservations, and digital presence for thousands of hospitality brands. While
  BentoBox runs a Technology Partners program and connects to 50+ third-party
  services across POS, reservations, delivery, payments, marketing, and
  shipping, it does not publish a public self-service developer API or API
  reference. Integrations are built through partnership rather than open
  documentation, and prospective technology partners are directed to contact the
  BentoBox partnerships team to integrate with the platform. As a Fiserv
  company, payments and commerce flows connect through Clover and Fiserv rails.
