    description: >-
      POS integration with Clover (a Fiserv company) for menu, ordering, and
      payment synchronization.
  - name: Square for Restaurants
    description: >-
      POS and payments integration syncing menus and orders with Square.
  - name: OpenTable
    description: Reservations integration surfacing OpenTable booking on BentoBox sites.
  - name: Resy
    description: Reservations integration connecting Resy booking to BentoBox sites.
  - name: SevenRooms
    description: Reservation and guest-management integration with SevenRooms.
  - name: DoorDash
    description: On-demand delivery and dispatch integration for online orders.
  - name: Stripe
    description: Payment processing integration for online ordering and commerce.
  - name: Google Pay
    description: Digital wallet checkout integration for faster online ordering.
  - name: Mailchimp
    description: Email-marketing integration syncing diner contacts and campaigns.
  - name: Constant Contact
    description: Email-marketing integration for restaurant audience engagement.
  - name: ShipStation
    description: Shipping/fulfillment integration for merchandise and shippable goods.
  - name: Shippo
    description: Multi-carrier shipping integration for ecommerce fulfillment.
  - name: Google Analytics
    description: Web analytics integration for traffic and conversion measurement.
  - name: Meta for Business
    description: Facebook and Instagram integration for social presence and ads.
